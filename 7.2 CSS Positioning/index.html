<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    /* Write your code here */
    .blue-box{
      background-color: blue;
      height: 300px;
      width: 500px;
      margin-top: 200px;
      margin-left: 200px;
      position:relative;
    }
    .red-circle{
      background-color: red;
      height: 200px;
      width: 200px;
      border-radius: 300px;
      position:absolute;
      left: 300px;
      top:0px;
    }
    .nav-bar{
      height:20px;
      width: 100%;
      background-color: aquamarine;
      position:fixed;
      top:0;
      left: 0;
      right:0; 
    }
  </style>
</head>

<body>
  <div class="nav-bar">

  </div>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
